  <p style="color:var(--color-text-secondary);font-size:13px;text-align:center;margin:4px 0">Click any module above to explore its functions</p>
</div>

<script>
const D = {
  data:{l:'Data input',f:'run_backtest.py',
    s:'Entry point for the whole system. Reads the raw options chain CSV and orchestrates every subsequent stage.',
    fns:[
      ['load_data(filepath)','Reads CSV via pd.read_csv; casts quote_date and expire_date to datetime64; returns a flat options DataFrame with all strikes and expiries.'],
      ['main()','Top-level orchestrator. Calls: load_data → run_signal_pipeline → run_rules → configure (Sizer/Hedger/Costs/Backtest) → VolBacktest.run() → compute_performance → plot_results.'],
    ]},
  signal:{l:'Signal engine',f:'signal.py',
    s:'Produces a composite score (out) from 6 weighted market features. Positive = rich implied vol (sell straddles); negative = cheap (buy). Signal mode can be inverted via config.',
    fns:[
      ['run_signal_pipeline(data)','Entry point. Adds moneyness and abs_moneyness columns, instantiates volSignalEngine, calls compute_features().'],
      ['compute_features(data)','Master method: calls all sub-engines → assembles dailyData → computes contributions → appends signal columns. Returns final DataFrame.'],
      ['_compute_term_structure_score()','Groups by date, slices near (20-30 DTE) and far (45-90 DTE) contracts, returns far_IV − near_IV = raw term slope. Positive = normal contango.'],
      ['_compute_skew()','OTM put IV minus OTM call IV within 5% moneyness. Positive skew = put buyers paying up = bearish hedging demand.'],
      ['_compute_regime_score(rv)','Returns −tanh(RV_z / 2). High realized vol → negative score → penalizes short-vol trades during turbulent regimes.'],
      ['_compute_liquidity_score()','Sigmoid of the average of (log-volume z-score) and (inverse-spread z-score). Output range 0–1; 0.5 = neutral.'],
      ['_compute_contributions()','Applies config weights (w_spread_z, w_skew, w_regime, …) to produce per-feature contribution columns for later attribution.'],
      ['_generate_signal(out)','Stateful loop: long entry when out ≥ entry_z, exit when out falls below exit_z. short_rich_vol mode inverts the thresholds.'],
    ]},
  rules:{l:'Trade rules',f:'rules.py',
    s:'Applies institutional execution constraints to the raw signal before it reaches the engine. All transformations are vectorized except the stateful path-dependent loop.',
    fns:[
      ['run_rules(df, config)','Creates VolTradeRules(config) and calls apply(df). Returns executable_signals with entry_flag / exit_flag / position columns.'],
      ['validate(df)','Raises ValueError listing any missing columns from the 5 required: quote_date, out, signal, signal_side, signal_change.'],
      ['apply(df)','Pipeline: (1) zero positions below min_liquidity score; (2) block direct flips if allow_flip=False; (3) shift entire position column by execution_lag (EOD signal → next-day trade); (4) call stateful rules.'],
      ['_apply_stateful_rules(executed)','Bar-by-bar loop. Suppresses new entries within cooldown_days of an exit. Forces exit when days_held ≥ max_holding_days. Writes resolved position back to pos_arr.'],
    ]},
  engine:{l:'Backtest engine',f:'engine.py',
    s:'Event-driven loop over every row of signals_df. Executes 4 ordered steps per bar and collects a snapshot dict that becomes a row in results_df.',
    fns:[
      ['[1 · Exit] exit_flag / _check_stop()','exit_flag=1 from rules triggers a close. _check_stop() also triggers if unrealized_pnl / entry_value ≤ −stop_loss_pct or ≥ +profit_take_pct.'],
      ['[1 · Exit] portfolio.close_position(contract_data)','Fetches today\'s contract via options_df.loc[(date, strike, expiry)]. Prices close at adverse fill. Flushes greek attribution to realized buckets. Sets position=None.'],
      ['[1 · Exit] portfolio.apply_hedge(−shares, spot)','Unwinds any residual delta-hedge shares at current spot price immediately after closing the option position.'],
      ['[2 · Entry] select_strike() + sizer.calculate_quantity()','Fetches daily chain via xs(date). Picks the strike with |c_delta − 0.50| minimum. Calls VolSizer for contract count using mode (vega/vol/kelly).'],
      ['[2 · Entry] create_straddle() + open_position()','Builds StraddlePosition — requires entry_row["position"]=±1 to be set before calling. Records premium cash flow and entry cost in Portfolio.'],
      ['[3 · Mark] options_df.loc[(date, strike, expiry)]','MultiIndex lookup for current contract prices and greeks. KeyError (data gap) gracefully degrades to last known price.'],
      ['[3 · Mark] portfolio.mark_to_market(contract_data)','Updates position MID price, runs Taylor attribution, updates unrealized PnL, returns the full bar snapshot dict.'],
      ['[4 · Hedge] hedger.calculate_hedge_action(shares, delta, spot)','Returns HedgeAction: DAILY always rebalances to −delta; BAND only trades when |portfolio_delta| ≥ threshold; NONE skips.'],
      ['[4 · Hedge] portfolio.apply_hedge(shares_to_trade, spot)','Executes the share trade, updates cash and weighted-avg cost, realizes partial/full hedge PnL if reducing.'],
      ['_check_stop()','pnl_pct = unrealized_pnl / (entry_price × qty × 100). Returns True when pnl_pct ≤ −stop_loss_pct or ≥ +profit_take_pct.'],
      ['_add_drawdown(df)','Vectorized: peak = cummax(nav); drawdown = (nav − peak) / peak. Appended to results_df after the loop completes.'],
    ]},
  portfolio:{l:'Portfolio',f:'portfolio.py',
    s:'Single-strategy ledger. Tracks cash, delta-hedge shares, one open StraddlePosition, and all realized PnL buckets. Called by the engine every bar.',
    fns:[
      ['open_position(position, row)','Pays/receives straddle premium: (−side) × (c_price + p_price) × 100 × qty. Long pays, short receives. Deducts entry cost. Stores position reference.'],
      ['close_position(row)','Adverse fills (long → bid, short → ask). Deducts close cost. Adds position.unrealized_pnl to _option_pnl. Flushes attribution dict into _delta/gamma/vega/theta_pnl buckets. Sets position=None.'],
      ['apply_hedge(share_change, spot)','Buys/sells shares. Tracks weighted-avg cost via running total. Realizes PnL on partial/full close. Deducts equity transaction costs.'],
      ['mark_to_market(row)','Calls position.mark_to_market(). Returns snapshot: cash, NAV, option/hedge/cost PnL cumulative totals, plus all 4 greek attribution columns.'],
    ]},
  position:{l:'Position',f:'position.py',
    s:'StraddlePosition dataclass tracks live state (price, spot, IV, greeks) and computes bar PnL with Taylor attribution. PositionManager handles strike selection and construction.',
    fns:[
      ['StraddlePosition.__post_init__()','Validates side ∈ {1,−1} and qty > 0. Seeds current_price=entry_price, current_spot=entry_spot, current_iv (from entry row), unrealized_pnl=0.'],
      ['mark_to_market(row)','Computes new MID = (bid+ask)/2. PnL change = side × (new_price − current_price) × qty × 100. Runs Taylor: δ·dS (delta), ½·Γ·dS² (gamma), V·dIV (vega), Θ·dt (theta). Refreshes greeks from row.'],
      ['portfolio_delta  (property)','Returns delta × quantity × 100. This is the scaled dollar delta passed to DeltaHedgeEngine each bar.'],
      ['PositionManager.select_strike()','Finds strike with minimum |c_delta − 0.50|. Falls back to nearest ATM by |(strike − spot)| if c_delta missing.'],
      ['PositionManager.create_straddle(row, qty)','Validates row["position"]=±1. Resolves MID prices. Seeds current_iv from row c_iv/p_iv so first-bar vega attribution is non-zero. Returns StraddlePosition.'],
    ]},
  sizing:{l:'Vol sizer',f:'sizing.py',
    s:'Computes contract quantity from one of three sizing modes, then applies three universal safety guards before returning.',
    fns:[
      ['calculate_quantity(row, signal_strength)','Calls mode sizer → clip to [min_contracts, max_contracts] → notional cap (max_notional_pct × portfolio_value) → floor to whole contracts. Returns float.'],
      ['_vega_size(row)','qty = target_vega_usd / (total_vega × 100). Targets a fixed $ sensitivity to a 1-vol-point IV move. Safe: returns min_contracts if vega < 0.001.'],
      ['_vol_target_size(row)','qty = (portfolio_value × target_vol / √252) / (total_vega_usd × IV / √252). Targets annualised portfolio volatility contribution from this position.'],
      ['_kelly_size(signal_strength)','f* = (p·b − q)/b. Scaled by kelly_fraction × tanh(|signal_strength|). signal_strength is the raw composite out score from the signal engine.'],
    ]},
  hedge_engine:{l:'Delta hedge engine',f:'delta_hedge.py',
    s:'Calculates the shares_to_trade needed to keep portfolio delta near zero each bar. Three operating modes selectable at config time.',
    fns:[
      ['calculate_hedge_action(shares, delta, spot, is_closing)','is_closing=True → trade −current_shares (full unwind). DAILY → always rebalance to target=−delta. BAND → only trade when |portfolio_delta| ≥ threshold. NONE → skip.'],
      ['_compute_hedge_cost(shares, spot)','cost = |shares| × (hedge_cost_per_share + slippage_pct × spot). abs() is critical: sell orders have negative share_change but positive cost.'],
    ]},
  costs:{l:'Cost model',f:'transactions_costs.py',
    s:'Models all trading frictions. Called by Portfolio on every open, close, and hedge trade. All costs deducted from cash and accumulated in _total_costs.',
    fns:[
      ['option_open_cost(row, qty, side)','half_spread × 2 legs × qty × 100  +  max(qty × commission, min_ticket) per leg × 2  +  slippage_pct × mid_straddle × qty × 100.'],
      ['option_close_cost(row, qty, side)','Same structure as open cost, plus SEC fee (8/1M × notional) when side=1 (long straddle close = sell-to-close, which triggers the fee).'],
      ['equity_cost(shares, spot)','commission + slippage + SEC fee (8/1M × notional) + FINRA TAF (capped at $7.27) — last two only on sales (shares < 0).'],
      ['_calculate_half_spread(row, leg)','Returns (ask − bid) / 2. Logs a debug warning and returns fallback_spread / 2 if bid or ask is NaN / missing.'],
    ]},
  performance:{l:'Performance metrics',f:'performace.py',
    s:'Computes the full tear sheet from the results DataFrame returned by VolBacktest.run(). Returns a pd.Series so it\'s easy to compare across runs.',
    fns:[
      ['compute_performance(results)','Returns: total_return_pct, cagr_pct, ann_vol_pct, sharpe, sortino, calmar, max_drawdown_pct, avg_drawdown_pct, option/hedge/cost PnL totals, cost_drag, hedge_efficiency, plus all trade stats.'],
      ['_trade_statistics(results)','Detects entry/exit bars from diff of has_position. Computes win_rate = wins / num_trades (not wins / num_bars — fixed bug). Returns profit_factor, avg_win, avg_loss, avg_holding_days.'],
    ]},
  output:{l:'Chart output',f:'run_backtest.py',
    s:'Generates a 3-panel matplotlib dashboard saved to logs/backtest_results.png and displayed. Also prints a formatted tear sheet to stdout.',
    fns:[
      ['plot_results(results_df)','Panel 1: NAV curve with above/below-baseline fill. Panel 2: cumulative option PnL / hedge PnL / −costs. Panel 3: cumulative delta / gamma / vega / theta PnL (greek attribution).'],
      ['main() — tear sheet print','Prints: total return, CAGR, ann vol, Sharpe, Sortino, Calmar, max DD, option/hedge/cost PnL, hedge efficiency, num trades, win rate, profit factor, avg holding days. Greek attribution summary at end.'],
    ]},
};

function show(id) {
  const d = D[id];
  if (!d) return;
  const rows = d.fns.map(([c,desc]) => {
    const m = c.match(/^\[([^\]]+)\]\s*(.*)/);
    const tag = m ? `<span class="stag">${m[1]}</span>` : '';
    const code = m ? m[2] : c;
    return `<div class="fr"><span class="fc">${tag}${code}</span><span class="fd">${desc}</span></div>`;
  }).join('');
  document.getElementById('det').innerHTML =
    `<div style="display:flex;align-items:center;gap:4px;margin-bottom:8px">
       <span style="font-size:14px;font-weight:500;color:var(--color-text-primary)">${d.l}</span>
       <span class="badge">${d.f}</span>
     </div>
     <p style="font-size:12px;color:var(--color-text-secondary);margin:0 0 10px;line-height:1.55">${d.s}</p>
     <div style="border-top:0.5px solid var(--color-border-tertiary)">${rows}</div>`;
}
</script>
